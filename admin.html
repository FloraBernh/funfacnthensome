<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAss — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #222222;
            --text-secondary: #888888;
            --green: #C2FF66;
            --red: #FF8383;
            --border: #e0e0e0;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .topbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar h1 { font-size: 1.1rem; font-weight: 700; font-style: italic; }

        .topbar-link {
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s;
        }
        .topbar-link:hover { color: var(--text); }

        .main {
            max-width: 720px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.4rem;
            margin-bottom: 1.5rem;
        }

        .card h2 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .fact-textarea {
            width: 100%;
            min-height: 110px;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            line-height: 1.55;
            color: var(--text);
            outline: none;
            resize: vertical;
            transition: border-color 0.15s;
        }

        .fact-textarea:focus { border-color: var(--text); }
        .fact-textarea::placeholder { color: #bbb; }

        .actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            margin-top: 0.9rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.65rem 1.4rem;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: var(--text); color: white; }
        .btn-primary:hover:not(:disabled) { background: #444; }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
        }
        .btn-ghost:hover { color: var(--text); border-color: var(--text); }

        .status {
            font-size: 0.8rem;
            color: var(--text-secondary);
            min-height: 1.2em;
        }
        .status.success { color: #38a169; font-weight: 500; }
        .status.error { color: var(--red); font-weight: 500; }

        .count {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        .list-empty {
            padding: 2rem 1rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }

        .fact-item {
            display: flex;
            align-items: flex-start;
            gap: 0.7rem;
            padding: 0.9rem 0;
            border-bottom: 1px solid var(--border);
        }
        .fact-item:last-child { border-bottom: none; }

        .fact-item-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 0.2rem;
        }

        .fact-item-text {
            flex: 1;
            font-size: 0.88rem;
            line-height: 1.55;
            color: var(--text);
            word-break: break-word;
        }

        .fact-item-thumb {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .fact-item-delete {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1rem;
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            transition: all 0.15s;
            flex-shrink: 0;
            line-height: 1;
        }
        .fact-item-delete:hover {
            color: var(--red);
            background: #fff0f0;
        }

        .loading {
            padding: 2rem 1rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.88rem;
        }

        .token-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .token-modal.open { display: flex; }
        .token-box {
            background: white;
            border-radius: var(--radius);
            padding: 1.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .token-box h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .token-box p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        .token-input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            margin-bottom: 0.9rem;
        }
        .token-input:focus { border-color: var(--text); }
        .token-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .field {
            margin-top: 0.8rem;
        }

        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .field-input,
        .field-select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
            background: white;
        }

        .field-input:focus,
        .field-select:focus { border-color: var(--text); }
        .field-input::placeholder { color: #bbb; }

        .field-grid {
            display: grid;
            grid-template-columns: 1fr 160px;
            gap: 0.7rem;
        }

        .fact-item-meta {
            margin-top: 0.4rem;
            font-size: 0.74rem;
            color: var(--text-secondary);
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .fact-item-meta a { color: #5588cc; text-decoration: none; }
        .fact-item-meta a:hover { text-decoration: underline; }

        .cred-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .cred-pill::before {
            content: "";
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ddd;
        }
        .cred-pill.high::before { background: var(--green); }
        .cred-pill.medium::before { background: #FFDB77; }
        .cred-pill.low::before { background: var(--red); }

        .stat-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            background: #f5f5f5;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text);
        }
        .stat-chip strong { font-weight: 700; }

        @media (max-width: 500px) {
            .main { padding: 1rem; }
            .card { padding: 1.1rem; }
            .actions { flex-direction: column-reverse; align-items: stretch; }
            .actions .btn { width: 100%; }
            .field-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>SmartAss — Admin</h1>
        <a href="index.html" class="topbar-link">← Tillbaka till sidan</a>
    </div>

    <div class="main">
        <div class="card">
            <h2>Lägg till ny fakta</h2>
            <input
                type="text"
                id="titleInput"
                class="field-input"
                placeholder="Rubrik"
                maxlength="120"
                style="margin-bottom:0.7rem;"
            >
            <textarea
                id="factInput"
                class="fact-textarea"
                placeholder="Skriv din fakta här..."
                maxlength="600"
            ></textarea>

            <div class="field-grid">
                <div class="field">
                    <label class="field-label" for="sourceNameInput">Källa (namn)</label>
                    <input
                        type="text"
                        id="sourceNameInput"
                        class="field-input"
                        placeholder="t.ex. NASA, Wikipedia, SVT..."
                        maxlength="120"
                    >
                </div>
                <div class="field">
                    <label class="field-label" for="credibilityInput">Trovärdighet</label>
                    <select id="credibilityInput" class="field-select">
                        <option value="high">Hög</option>
                        <option value="medium">Medel</option>
                        <option value="low">Låg</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="field-label" for="sourceUrlInput">Käll-URL (frivilligt)</label>
                <input
                    type="url"
                    id="sourceUrlInput"
                    class="field-input"
                    placeholder="https://..."
                    maxlength="500"
                >
            </div>

            <div class="field">
                <label class="field-label" for="imageInput">Bild (frivilligt, max 3 MB)</label>
                <input
                    type="file"
                    id="imageInput"
                    class="field-input"
                    accept="image/jpeg,image/png,image/webp,image/gif,image/svg+xml"
                >
                <div id="imagePreview" style="margin-top:0.6rem; display:none;">
                    <img id="imagePreviewImg" style="max-width:180px; max-height:180px; border-radius:8px; border:1px solid var(--border);">
                    <button type="button" id="imageClearBtn" class="btn btn-ghost" style="margin-left:0.5rem; padding:0.4rem 0.8rem; font-size:0.75rem;">Ta bort</button>
                </div>
            </div>

            <div class="actions">
                <div class="status" id="status"></div>
                <button class="btn btn-primary" id="publishBtn">Publicera</button>
            </div>
        </div>

        <div class="card">
            <h2>Publicerade fakta</h2>
            <div class="count" id="count"></div>
            <div id="factList">
                <div class="loading">Laddar...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <div class="token-modal" id="tokenModal">
        <div class="token-box">
            <h3>GitHub-token krävs</h3>
            <p>Klistra in din GitHub Personal Access Token. Den sparas lokalt på din enhet och används för att uppdatera <code>published-data.json</code>.</p>
            <input type="password" id="tokenInput" class="token-input" placeholder="ghp_..." autocomplete="off">
            <div class="token-actions">
                <button class="btn btn-ghost" id="tokenCancelBtn">Avbryt</button>
                <button class="btn btn-primary" id="tokenSaveBtn">Spara</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = "FloraBernh/funfacnthensome";
        const FILE = "published-data.json";
        const TOKEN_KEY = "smartass_gh_token";

        // ========== FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBb564Dfem8IPMrKxV54AOsqLB6x8wqpu4",
            authDomain: "smartass-54b33.firebaseapp.com",
            projectId: "smartass-54b33",
            storageBucket: "smartass-54b33.firebasestorage.app",
            messagingSenderId: "802864537973",
            appId: "1:802864537973:web:bfea158ded445ff04fb33c"
        };
        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) { console.warn("Firebase init failed:", e); }

        function factHash(text) {
            const s = (text || "").trim();
            let h = 5381;
            for (let i = 0; i < s.length; i++) {
                h = ((h << 5) + h + s.charCodeAt(i)) >>> 0;
            }
            return "f" + h.toString(36);
        }

        let factStats = {}; // factHash → { knewCount, learnedCount }

        async function loadStats() {
            if (!db) return;
            try {
                const snap = await db.collection("factStats").get();
                const m = {};
                snap.forEach(doc => { m[doc.id] = doc.data(); });
                factStats = m;
            } catch (e) {
                console.warn("loadStats failed:", e);
            }
        }

        let facts = [];
        let fileSha = "";
        let loaded = false;

        const els = {
            title: document.getElementById("titleInput"),
            input: document.getElementById("factInput"),
            sourceName: document.getElementById("sourceNameInput"),
            sourceUrl: document.getElementById("sourceUrlInput"),
            credibility: document.getElementById("credibilityInput"),
            imageFile: document.getElementById("imageInput"),
            imagePreview: document.getElementById("imagePreview"),
            imagePreviewImg: document.getElementById("imagePreviewImg"),
            imageClearBtn: document.getElementById("imageClearBtn"),
            publishBtn: document.getElementById("publishBtn"),
            status: document.getElementById("status"),
            list: document.getElementById("factList"),
            count: document.getElementById("count"),
        };

        const MAX_IMAGE_BYTES = 3 * 1024 * 1024; // 3 MB

        const CRED_LABEL = { high: "Hög", medium: "Medel", low: "Låg" };

        function setStatus(msg, kind = "") {
            els.status.textContent = msg;
            els.status.className = "status" + (kind ? " " + kind : "");
        }

        function askForToken() {
            return new Promise((resolve) => {
                const modal = document.getElementById("tokenModal");
                const input = document.getElementById("tokenInput");
                const saveBtn = document.getElementById("tokenSaveBtn");
                const cancelBtn = document.getElementById("tokenCancelBtn");

                input.value = "";
                modal.classList.add("open");
                setTimeout(() => input.focus(), 50);

                const cleanup = () => {
                    modal.classList.remove("open");
                    saveBtn.removeEventListener("click", onSave);
                    cancelBtn.removeEventListener("click", onCancel);
                    input.removeEventListener("keydown", onKey);
                };
                const onSave = () => {
                    const value = input.value.trim();
                    cleanup();
                    if (value) {
                        localStorage.setItem(TOKEN_KEY, value);
                        resolve(value);
                    } else {
                        resolve(null);
                    }
                };
                const onCancel = () => { cleanup(); resolve(null); };
                const onKey = (e) => {
                    if (e.key === "Enter") { e.preventDefault(); onSave(); }
                    else if (e.key === "Escape") { e.preventDefault(); onCancel(); }
                };
                saveBtn.addEventListener("click", onSave);
                cancelBtn.addEventListener("click", onCancel);
                input.addEventListener("keydown", onKey);
            });
        }

        async function getToken() {
            let token = localStorage.getItem(TOKEN_KEY);
            if (!token) token = await askForToken();
            return token;
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str ?? "";
            return div.innerHTML;
        }

        async function ghFetch() {
            const token = await getToken();
            if (!token) throw new Error("Ingen GitHub-token angiven.");
            const res = await fetch(
                `https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE}?ref=main&_=${Date.now()}`,
                { headers: { "Authorization": `token ${token}` } }
            );
            if (res.status === 401) {
                localStorage.removeItem(TOKEN_KEY);
                throw new Error("Ogiltig GitHub-token. Försök igen.");
            }
            if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
            const data = await res.json();
            fileSha = data.sha;
            const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
            return JSON.parse(decoded || "[]");
        }

        // ========== BILD ==========
        function clearImage() {
            els.imageFile.value = "";
            els.imagePreviewImg.src = "";
            els.imagePreview.style.display = "none";
        }

        els.imageClearBtn.addEventListener("click", clearImage);

        els.imageFile.addEventListener("change", () => {
            const file = els.imageFile.files?.[0];
            if (!file) { clearImage(); return; }
            if (file.size > MAX_IMAGE_BYTES) {
                setStatus(`Bilden är för stor (${(file.size / 1024 / 1024).toFixed(1)} MB). Max 3 MB.`, "error");
                clearImage();
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                els.imagePreviewImg.src = e.target.result;
                els.imagePreview.style.display = "";
            };
            reader.readAsDataURL(file);
        });

        function fileExtFromName(name) {
            const m = (name || "").match(/\.([a-zA-Z0-9]{1,5})$/);
            return m ? m[1].toLowerCase() : "jpg";
        }

        function fileToBase64Content(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const result = reader.result;
                    // Strip "data:image/...;base64," prefix
                    const idx = result.indexOf(",");
                    resolve(idx >= 0 ? result.slice(idx + 1) : result);
                };
                reader.onerror = () => reject(new Error("Kunde inte läsa bilden."));
                reader.readAsDataURL(file);
            });
        }

        async function uploadImageToRepo(file, token) {
            const ext = fileExtFromName(file.name) || "jpg";
            const path = `images/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
            const content = await fileToBase64Content(file);
            const res = await fetch(
                `https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,
                {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: `Lägg till bild ${path}`,
                        content,
                        branch: "main",
                    }),
                }
            );
            if (res.status === 401) {
                localStorage.removeItem(TOKEN_KEY);
                throw new Error("Ogiltig GitHub-token.");
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || `GitHub API: ${res.status}`);
            }
            return path;
        }

        async function ghPut(newFacts) {
            const token = await getToken();
            if (!token) throw new Error("Ingen GitHub-token angiven.");
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(newFacts, null, 2) + "\n")));
            const body = {
                message: `Uppdatera ${FILE} via admin`,
                content,
                branch: "main",
            };
            if (fileSha) body.sha = fileSha;

            const res = await fetch(
                `https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE}`,
                {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(body),
                }
            );
            if (res.status === 401) {
                localStorage.removeItem(TOKEN_KEY);
                throw new Error("Ogiltig GitHub-token.");
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || `GitHub API: ${res.status}`);
            }
            const data = await res.json();
            fileSha = data.content?.sha || "";
        }

        function renderList() {
            els.count.textContent = facts.length === 0
                ? ""
                : `${facts.length} ${facts.length === 1 ? "fakta" : "fakta"} totalt`;

            if (facts.length === 0) {
                els.list.innerHTML = `<div class="list-empty">Inga publicerade fakta ännu. Skriv en ovan och tryck Publicera.</div>`;
                return;
            }

            els.list.innerHTML = facts
                .map((f, i) => {
                    const cred = f.credibility || "high";
                    const credLabel = CRED_LABEL[cred] || CRED_LABEL.high;
                    const sourceHtml = f.sourceName
                        ? (f.sourceUrl
                            ? `<a href="${escapeHtml(f.sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(f.sourceName)}</a>`
                            : `<span>${escapeHtml(f.sourceName)}</span>`)
                        : "";
                    const stats = factStats[factHash(f.text)] || {};
                    const knew = stats.knewCount || 0;
                    const learned = stats.learnedCount || 0;
                    const metaParts = [
                        `<span class="cred-pill ${cred}">${credLabel}</span>`,
                        sourceHtml ? `Källa: ${sourceHtml}` : "",
                        `<span class="stat-chip" title="Visste redan">🧠 <strong>${knew}</strong></span>`,
                        `<span class="stat-chip" title="Lärde sig nytt">💡 <strong>${learned}</strong></span>`,
                    ].filter(Boolean);
                    const thumbHtml = f.imageUrl
                        ? `<img src="${escapeHtml(f.imageUrl)}" alt="" class="fact-item-thumb" loading="lazy" onerror="this.style.display='none'">`
                        : "";
                    const titleHtml = f.title
                        ? `<div class="fact-item-title">${escapeHtml(f.title)}</div>`
                        : "";
                    return `
                        <div class="fact-item">
                            ${thumbHtml}
                            <div style="flex:1; min-width:0;">
                                ${titleHtml}
                                <div class="fact-item-text">${escapeHtml(f.text)}</div>
                                <div class="fact-item-meta">${metaParts.join("&nbsp;·&nbsp;")}</div>
                            </div>
                            <button class="fact-item-delete" data-index="${i}" title="Ta bort">✕</button>
                        </div>`;
                })
                .join("");
        }

        async function loadFacts() {
            try {
                const [factsResult] = await Promise.all([ghFetch(), loadStats()]);
                facts = factsResult;
                if (!Array.isArray(facts)) facts = [];
                loaded = true;
                renderList();
            } catch (e) {
                els.list.innerHTML = `<div class="list-empty">Kunde inte ladda: ${escapeHtml(e.message)}<br><button class="btn btn-ghost" style="margin-top:0.8rem;" id="retryBtn">Försök igen</button></div>`;
                document.getElementById("retryBtn")?.addEventListener("click", loadFacts);
            }
        }

        async function publishFact() {
            if (!loaded) {
                setStatus("Vänta tills publicerade fakta har laddats först.", "error");
                return;
            }
            const text = els.input.value.trim();
            if (!text) {
                setStatus("Skriv en fakta först.", "error");
                els.input.focus();
                return;
            }

            const title = els.title.value.trim();
            const sourceName = els.sourceName.value.trim();
            const sourceUrl = els.sourceUrl.value.trim();
            const credibility = els.credibility.value || "high";
            const imageFile = els.imageFile.files?.[0] || null;

            if (sourceUrl && !/^https?:\/\//i.test(sourceUrl)) {
                setStatus("Käll-URL måste börja med http:// eller https://", "error");
                els.sourceUrl.focus();
                return;
            }

            els.publishBtn.disabled = true;
            setStatus(imageFile ? "Laddar upp bild..." : "Publicerar...");

            const newFact = { text, credibility };
            if (title) newFact.title = title;
            if (sourceName) newFact.sourceName = sourceName;
            if (sourceUrl) newFact.sourceUrl = sourceUrl;

            try {
                if (imageFile) {
                    const token = await getToken();
                    if (!token) throw new Error("Ingen GitHub-token angiven.");
                    const imagePath = await uploadImageToRepo(imageFile, token);
                    newFact.imageUrl = imagePath;
                    setStatus("Publicerar...");
                }

                const updated = [...facts, newFact];
                await ghPut(updated);
                facts = updated;
                els.title.value = "";
                els.input.value = "";
                els.sourceName.value = "";
                els.sourceUrl.value = "";
                els.credibility.value = "high";
                clearImage();
                renderList();
                setStatus("✓ Publicerad!", "success");
                setTimeout(() => { if (els.status.textContent === "✓ Publicerad!") setStatus(""); }, 3000);
            } catch (e) {
                setStatus("Kunde inte publicera: " + e.message, "error");
            } finally {
                els.publishBtn.disabled = false;
            }
        }

        async function deleteFact(index) {
            const fact = facts[index];
            if (!fact) return;
            const preview = (fact.text || "").slice(0, 60) + (fact.text.length > 60 ? "..." : "");
            if (!confirm(`Radera den här faktan?\n\n"${preview}"`)) return;

            const updated = facts.slice(0, index).concat(facts.slice(index + 1));
            setStatus("Raderar...");

            try {
                await ghPut(updated);
                facts = updated;
                renderList();
                setStatus("✓ Raderad!", "success");
                setTimeout(() => { if (els.status.textContent === "✓ Raderad!") setStatus(""); }, 3000);
            } catch (e) {
                setStatus("Kunde inte radera: " + e.message, "error");
            }
        }

        els.publishBtn.addEventListener("click", publishFact);

        els.input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                publishFact();
            }
        });

        els.list.addEventListener("click", (e) => {
            const btn = e.target.closest(".fact-item-delete");
            if (!btn) return;
            const i = Number(btn.dataset.index);
            if (Number.isInteger(i)) deleteFact(i);
        });

        loadFacts();
    </script>
</body>
</html>
