<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Fun Facts N Then Some</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f4ff;
            --card-bg: rgba(255, 255, 255, 0.55);
            --text: #222222;
            --text-secondary: #777a86;
            --green: #C2FF66;
            --border: rgba(255, 255, 255, 0.6);
            --radius: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        /* Färgade ljusklotar i bakgrunden ger glaset något att brytas mot */
        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.65;
            z-index: -1;
            pointer-events: none;
        }
        body::before {
            width: 520px;
            height: 520px;
            background: radial-gradient(circle, #C2FF66 0%, transparent 70%);
            top: -160px;
            left: -120px;
        }
        body::after {
            width: 620px;
            height: 620px;
            background: radial-gradient(circle, #FFDB77 0%, #FF8383 60%, transparent 80%);
            bottom: -200px;
            right: -180px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem 1.5rem;
            padding-bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .random-btn {
            width: 100%;
            padding: 1.3rem 1.5rem;
            background: rgba(34, 34, 34, 0.85);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .random-btn:hover {
            background: rgba(40, 40, 40, 0.9);
            transform: translateY(-1px);
            box-shadow:
                0 14px 36px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }
        .random-btn:active { transform: scale(0.98); }

        .fact-area {
            width: 100%;
            min-width: 0;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }
        .fact-area:empty { margin-bottom: 0; }

        .fact-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.6rem 1.5rem;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.65);
            touch-action: pan-y;
            will-change: transform, opacity;
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            box-shadow:
                0 12px 40px rgba(40, 40, 70, 0.10),
                0 2px 8px rgba(40, 40, 70, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.85);
        }

        .fact-image-frame {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 1.8rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.6rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 4px 12px rgba(40, 40, 70, 0.04);
        }
        .fact-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(60px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-60px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideOutToLeft {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(-60px); }
        }
        @keyframes slideOutToRight {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(60px); }
        }
        .fact-card.anim-in-right  { animation: slideInFromRight 0.28s cubic-bezier(.25,.46,.45,.94) both; }
        .fact-card.anim-in-left   { animation: slideInFromLeft  0.28s cubic-bezier(.25,.46,.45,.94) both; }
        .fact-card.anim-in-fade   { animation: fadeIn           0.28s ease both; }
        .fact-card.anim-out-left  { animation: slideOutToLeft   0.22s ease forwards; pointer-events: none; }
        .fact-card.anim-out-right { animation: slideOutToRight  0.22s ease forwards; pointer-events: none; }

        .fact-title {
            font-size: 1.85rem;
            font-weight: 600;
            line-height: 1.25;
            margin-bottom: 0.8rem;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .fact-text {
            font-size: 1.08rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
            color: var(--text);
        }

        .fact-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .credibility {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text);
            background: rgba(255, 255, 255, 0.5);
            padding: 0.3rem 0.75rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .cred-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #ddd;
        }

        .cred-high .cred-dot { background: var(--green); }
        .cred-medium .cred-dot { background: #FFDB77; }
        .cred-low .cred-dot { background: #FF8383; }
        .cred-label { font-weight: 600; }

        .source-link {
            color: #5588cc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.15s;
        }
        .source-link:hover { opacity: 0.7; text-decoration: underline; }

        .source-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .fact-actions {
            display: flex;
            gap: 1.2rem;
            margin-top: 1.4rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.6);
        }
        .fact-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.55rem 1.1rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.65);
            background: rgba(255, 255, 255, 0.55);
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            white-space: nowrap;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                0 2px 6px rgba(40, 40, 70, 0.05);
        }
        .fact-action-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-1px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 4px 12px rgba(40, 40, 70, 0.08);
        }
        .fact-action-btn:active { transform: scale(0.97); }

        .error-msg {
            color: var(--text-secondary);
            font-size: 0.88rem;
            padding: 1.5rem 0;
            text-align: center;
        }

        @media (max-width: 500px) {
            .fact-footer { flex-direction: column; align-items: flex-start; }
            .fact-actions { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="fact-area" id="factArea"></div>
        <div id="randomSection" style="width:100%;">
            <button type="button" class="random-btn" id="randomBtn">Berätta något jag inte vet</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        // ========== SEEN FACTS TRACKER (localStorage) ==========
        const SEEN_KEY = "smartass_seen";
        const SEEN_EXPIRY_DAYS = 7;

        function getSeenFacts() {
            try {
                const data = JSON.parse(localStorage.getItem(SEEN_KEY) || "{}");
                const cutoff = Date.now() - SEEN_EXPIRY_DAYS * 24 * 60 * 60 * 1000;
                const cleaned = {};
                for (const [key, ts] of Object.entries(data)) {
                    if (ts > cutoff) cleaned[key] = ts;
                }
                if (Object.keys(cleaned).length !== Object.keys(data).length) {
                    localStorage.setItem(SEEN_KEY, JSON.stringify(cleaned));
                }
                return cleaned;
            } catch { return {}; }
        }

        function factId(fact) {
            return (fact.text || "").slice(0, 80);
        }

        function markFactSeen(fact) {
            try {
                const data = getSeenFacts();
                data[factId(fact)] = Date.now();
                localStorage.setItem(SEEN_KEY, JSON.stringify(data));
            } catch {}
        }

        function isFactSeen(fact) {
            return !!getSeenFacts()[factId(fact)];
        }

        // ========== KNOWN FACTS TRACKER (localStorage) ==========
        const KNOWN_KEY = "smartass_known";

        function getKnownFacts() {
            try { return JSON.parse(localStorage.getItem(KNOWN_KEY) || "{}"); }
            catch { return {}; }
        }

        function markFactKnown(fact) {
            try {
                const data = getKnownFacts();
                data[factId(fact)] = Date.now();
                localStorage.setItem(KNOWN_KEY, JSON.stringify(data));
            } catch {}
        }

        function isFactKnown(fact) {
            return !!getKnownFacts()[factId(fact)];
        }

        // ========== HELPERS ==========
        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str ?? "";
            return div.innerHTML;
        }

        const CRED_LABEL = { high: "Hög", medium: "Medel", low: "Låg" };

        // ========== FIREBASE (Firestore för klick-statistik) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBb564Dfem8IPMrKxV54AOsqLB6x8wqpu4",
            authDomain: "smartass-54b33.firebaseapp.com",
            projectId: "smartass-54b33",
            storageBucket: "smartass-54b33.firebasestorage.app",
            messagingSenderId: "802864537973",
            appId: "1:802864537973:web:bfea158ded445ff04fb33c"
        };

        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) {
            console.warn("Firebase init failed:", e);
        }

        // Stabil hash för faktatext → Firestore-doc-ID (a-z0-9, max ~12 tecken)
        function factHash(text) {
            const s = (text || "").trim();
            let h = 5381;
            for (let i = 0; i < s.length; i++) {
                h = ((h << 5) + h + s.charCodeAt(i)) >>> 0;
            }
            return "f" + h.toString(36);
        }

        function trackClick(fact, field) {
            if (!db) return;
            const key = factHash(fact.text);
            db.collection("factStats").doc(key).set({
                text: fact.text,
                [field]: firebase.firestore.FieldValue.increment(1),
                lastClicked: firebase.firestore.FieldValue.serverTimestamp(),
            }, { merge: true }).catch(e => console.warn("trackClick failed:", e));
        }

        // ========== PUBLISHED FACTS ==========
        let _publishedFacts = [];
        async function loadPublishedFacts() {
            try {
                const res = await fetch("published-data.json?" + Date.now());
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data)) _publishedFacts = data;
                }
            } catch {}
        }

        // ========== STATE ==========
        let _currentFact = null;
        let _slideDir = null;

        function currentFact() {
            return _currentFact;
        }

        function pickRandomFact() {
            if (_publishedFacts.length === 0) return null;
            const knownIds = getKnownFacts();
            const candidates = _publishedFacts.filter(f => !knownIds[factId(f)]);
            if (candidates.length === 0) return null;
            const unseen = candidates.filter(f => !isFactSeen(f));
            const pool = unseen.length > 0 ? unseen : candidates;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // ========== RENDER ==========
        function renderSingleFact() {
            const fact = currentFact();
            const factArea = document.getElementById("factArea");
            if (!fact) {
                factArea.innerHTML = "";
                return;
            }

            const animClass = _slideDir === "next" ? "anim-in-right"
                            : _slideDir === "prev" ? "anim-in-left"
                            : "anim-in-fade";
            _slideDir = null;

            const cred = fact.credibility || "high";
            const credLabel = CRED_LABEL[cred] || CRED_LABEL.high;

            let sourceHtml = "";
            if (fact.sourceUrl) {
                const label = fact.sourceName ? `Källa: ${escapeHtml(fact.sourceName)}` : "Källa";
                sourceHtml = `<a href="${escapeHtml(fact.sourceUrl)}" target="_blank" rel="noopener noreferrer" class="source-link">${label}</a>`;
            } else if (fact.sourceName) {
                sourceHtml = `<span class="source-text">Källa: ${escapeHtml(fact.sourceName)}</span>`;
            }

            const imageHtml = fact.imageUrl
                ? `<div class="fact-image-frame"><img src="${escapeHtml(fact.imageUrl)}" alt="" class="fact-image" loading="lazy" onerror="this.parentElement.remove()"></div>`
                : "";

            const titleHtml = fact.title
                ? `<div class="fact-title">${escapeHtml(fact.title)}</div>`
                : "";

            factArea.innerHTML = `
                <div class="fact-card ${animClass}">
                    ${imageHtml}
                    ${titleHtml}
                    <div class="fact-text">${escapeHtml(fact.text)}</div>
                    <div class="fact-footer">
                        <div class="credibility cred-${cred}">
                            <span class="cred-dot"></span>
                            <span>Trovärdighet:</span>
                            <span class="cred-label">${credLabel}</span>
                        </div>
                        ${sourceHtml}
                    </div>
                    <div class="fact-actions">
                        <button class="fact-action-btn" id="learnedBtn">💡 Jaha, där lärde jag mig något nytt</button>
                        <button class="fact-action-btn" id="knewBtn">🧠 Detta visste jag om</button>
                    </div>
                </div>`;

            document.getElementById("knewBtn")?.addEventListener("click", () => {
                trackClick(fact, "knewCount");
                markFactKnown(fact);
                returnToStart();
            });

            document.getElementById("learnedBtn")?.addEventListener("click", () => {
                trackClick(fact, "learnedCount");
                returnToStart();
            });
        }

        // ========== NAV ==========
        function enterCardMode() {
            document.getElementById("randomSection").style.display = "none";
        }

        function returnToStart() {
            _currentFact = null;
            document.getElementById("factArea").innerHTML = "";
            document.getElementById("randomSection").style.display = "";
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById("randomBtn").addEventListener("click", async () => {
            if (_publishedFacts.length === 0) {
                document.getElementById("factArea").innerHTML =
                    `<div class="fact-card anim-in-fade"><div class="error-msg">Inga publicerade fakta ännu!</div></div>`;
                return;
            }
            const fact = pickRandomFact();
            if (!fact) {
                document.getElementById("factArea").innerHTML =
                    `<div class="fact-card anim-in-fade"><div class="error-msg">Inga fler nya fakta just nu.</div></div>`;
                return;
            }
            markFactSeen(fact);
            _currentFact = fact;
            enterCardMode();
            renderSingleFact();
        });

        // ========== INIT ==========
        loadPublishedFacts();
    </script>
</body>
</html>
