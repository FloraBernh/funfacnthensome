<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Fun Facts N Then Some</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f4ff;
            --card-bg: rgba(255, 255, 255, 0.55);
            --text: #222222;
            --text-secondary: #777a86;
            --green: #C2FF66;
            --border: rgba(255, 255, 255, 0.6);
            --radius: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding-bottom: 20vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        .lang-switcher {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.3rem;
            padding: 0.25rem;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(18px) saturate(200%);
            -webkit-backdrop-filter: blur(18px) saturate(200%);
            box-shadow: 0 2px 8px rgba(40, 40, 70, 0.04);
            z-index: 6;
        }
        .lang-switcher button {
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            min-width: 36px;
        }
        .lang-switcher button:hover {
            color: var(--text);
        }
        .lang-switcher button.is-active {
            background: rgba(34, 34, 34, 0.88);
            color: #fff;
        }
        @media (max-width: 500px) {
            .lang-switcher { top: 1rem; right: 1rem; }
        }

        .site-logo {
            position: fixed;
            top: 4rem;
            left: 50%;
            transform: translateX(-50%);
            height: 112px;
            width: auto;
            z-index: 5;
            pointer-events: none;
            user-select: none;
        }
        body.card-mode .site-logo {
            display: none;
        }
        @media (max-width: 500px) {
            .site-logo { height: 88px; top: 2.5rem; }
        }

        /* Färgade ljusklotar i bakgrunden — rör sig långsamt så glaset känns levande */
        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(110px);
            opacity: 0.75;
            z-index: -1;
            pointer-events: none;
            will-change: transform;
        }
        body::before {
            width: 820px;
            height: 820px;
            background: radial-gradient(circle, #C2FF66 0%, transparent 70%);
            top: -240px;
            left: -200px;
            animation: floatBlobA 20s ease-in-out infinite alternate;
        }
        body::after {
            width: 960px;
            height: 960px;
            background: radial-gradient(circle, #FFDB77 0%, #FF8383 55%, transparent 80%);
            bottom: -300px;
            right: -260px;
            animation: floatBlobB 24s ease-in-out infinite alternate;
        }

        @keyframes floatBlobA {
            0%   { transform: translate(0, 0)         scale(1); }
            25%  { transform: translate(260px, 140px) scale(1.18); }
            50%  { transform: translate(140px, 380px) scale(0.85); }
            75%  { transform: translate(340px, 220px) scale(1.25); }
            100% { transform: translate(80px, 60px)   scale(0.95); }
        }
        @keyframes floatBlobB {
            0%   { transform: translate(0, 0)             scale(1); }
            25%  { transform: translate(-200px, -260px)   scale(1.15); }
            50%  { transform: translate(-380px, -100px)   scale(0.82); }
            75%  { transform: translate(-120px, -340px)   scale(1.22); }
            100% { transform: translate(-260px, -60px)    scale(0.9); }
        }

        @media (prefers-reduced-motion: reduce) {
            body::before, body::after { animation: none; }
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem 1.5rem;
            padding-bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .random-btn {
            width: 100%;
            padding: 1.3rem 1.5rem;
            background: rgba(34, 34, 34, 0.85);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .random-btn:hover {
            background: rgba(40, 40, 40, 0.9);
            transform: translateY(-1px);
            box-shadow:
                0 14px 36px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }
        .random-btn:active { transform: scale(0.98); }

        .fact-area {
            width: 100%;
            min-width: 0;
            margin-bottom: 0.75rem;
        }
        .fact-area:empty { margin-bottom: 0; }

        .fact-card {
            position: relative;
            background: rgba(255, 255, 255, 0.35);
            border-radius: var(--radius);
            padding: 1.8rem 1.6rem;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.45);
            touch-action: pan-y;
            will-change: transform, opacity;
            backdrop-filter: blur(36px) saturate(200%);
            -webkit-backdrop-filter: blur(36px) saturate(200%);
            box-shadow: 0 4px 16px rgba(40, 40, 70, 0.05);
            overflow: hidden;
        }
        /* Subtil ljusreflex längs övre kanten — gradient i stället för hård linje */
        .fact-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 55%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.35), rgba(255,255,255,0));
            pointer-events: none;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        /* Bilden ligger fritt — ingen ram, ingen bakgrund */
        .fact-image-frame {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 280px;
            margin: 0 auto 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            padding: 0;
            position: relative;
            z-index: 1;
        }
        .fact-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(60px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-60px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideOutToLeft {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(-60px); }
        }
        @keyframes slideOutToRight {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(60px); }
        }
        .fact-card.anim-in-right  { animation: slideInFromRight 0.28s cubic-bezier(.25,.46,.45,.94) both; }
        .fact-card.anim-in-left   { animation: slideInFromLeft  0.28s cubic-bezier(.25,.46,.45,.94) both; }
        .fact-card.anim-in-fade   { animation: fadeIn           0.28s ease both; }
        .fact-card.anim-out-left  { animation: slideOutToLeft   0.22s ease forwards; pointer-events: none; }
        .fact-card.anim-out-right { animation: slideOutToRight  0.22s ease forwards; pointer-events: none; }

        .fact-title {
            font-size: 1.85rem;
            font-weight: 600;
            line-height: 1.25;
            margin-bottom: 0.8rem;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .fact-text {
            font-size: 1.08rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
            color: var(--text);
        }

        .fact-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .credibility {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .cred-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #ddd;
        }

        .cred-high .cred-dot { background: var(--green); }
        .cred-medium .cred-dot { background: #FFDB77; }
        .cred-low .cred-dot { background: #FF8383; }
        .cred-label { font-weight: 600; }

        .source-link {
            color: #5588cc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.15s;
        }
        .source-link:hover { opacity: 0.7; text-decoration: underline; }

        .source-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .fact-question {
            margin-top: 1.4rem;
            text-align: center;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
        }

        .fact-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 0.9rem;
            padding: 1rem 1.5rem;
            flex-wrap: wrap;
        }
        .fact-action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.65rem 2.2rem;
            min-width: 110px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: linear-gradient(to bottom, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.45) 65%);
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            color: var(--text);
            white-space: nowrap;
            backdrop-filter: blur(18px) saturate(200%);
            -webkit-backdrop-filter: blur(18px) saturate(200%);
            box-shadow: 0 2px 8px rgba(40, 40, 70, 0.04);
        }
        .fact-action-btn:hover {
            background: linear-gradient(to bottom, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.7) 65%);
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(40, 40, 70, 0.07);
        }
        .fact-action-btn:active { transform: scale(0.97); }

        /* Mörk variant — matchar 'Berätta'-knappen */
        .fact-action-btn.is-dark {
            background: linear-gradient(to bottom, rgba(60,60,60,0.9) 0%, rgba(34,34,34,0.85) 65%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }
        .fact-action-btn.is-dark:hover {
            background: linear-gradient(to bottom, rgba(70,70,70,0.92) 0%, rgba(40,40,40,0.9) 65%);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        }

        .error-msg {
            color: var(--text-secondary);
            font-size: 0.88rem;
            padding: 1.5rem 0;
            text-align: center;
        }

        @media (max-width: 500px) {
            .fact-footer { flex-direction: column; align-items: flex-start; }
            .fact-actions { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <img src="images/logo.svg" alt="Fun Facts N Then Some" class="site-logo">

    <div class="lang-switcher" id="langSwitcher">
        <button type="button" data-lang="sv">SV</button>
        <button type="button" data-lang="en">EN</button>
    </div>

    <div class="container">
        <div class="fact-area" id="factArea"></div>
        <div id="randomSection" style="width:100%;">
            <button type="button" class="random-btn" id="randomBtn">Berätta något jag inte vet</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        // ========== SEEN FACTS TRACKER (localStorage) ==========
        const SEEN_KEY = "smartass_seen";
        const SEEN_EXPIRY_DAYS = 7;

        function getSeenFacts() {
            try {
                const data = JSON.parse(localStorage.getItem(SEEN_KEY) || "{}");
                const cutoff = Date.now() - SEEN_EXPIRY_DAYS * 24 * 60 * 60 * 1000;
                const cleaned = {};
                for (const [key, ts] of Object.entries(data)) {
                    if (ts > cutoff) cleaned[key] = ts;
                }
                if (Object.keys(cleaned).length !== Object.keys(data).length) {
                    localStorage.setItem(SEEN_KEY, JSON.stringify(cleaned));
                }
                return cleaned;
            } catch { return {}; }
        }

        function factId(fact) {
            return (fact.text || "").slice(0, 80);
        }

        function markFactSeen(fact) {
            try {
                const data = getSeenFacts();
                data[factId(fact)] = Date.now();
                localStorage.setItem(SEEN_KEY, JSON.stringify(data));
            } catch {}
        }

        function isFactSeen(fact) {
            return !!getSeenFacts()[factId(fact)];
        }

        // ========== KNOWN FACTS TRACKER (localStorage) ==========
        const KNOWN_KEY = "smartass_known";

        function getKnownFacts() {
            try { return JSON.parse(localStorage.getItem(KNOWN_KEY) || "{}"); }
            catch { return {}; }
        }

        function markFactKnown(fact) {
            try {
                const data = getKnownFacts();
                data[factId(fact)] = Date.now();
                localStorage.setItem(KNOWN_KEY, JSON.stringify(data));
            } catch {}
        }

        function isFactKnown(fact) {
            return !!getKnownFacts()[factId(fact)];
        }

        // ========== HELPERS ==========
        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str ?? "";
            return div.innerHTML;
        }

        // ========== i18n ==========
        const LANG_KEY = "smartass_lang";
        const I18N = {
            sv: {
                randomBtn: "Berätta något jag inte vet",
                question: "Visste du om detta?",
                yes: "Ja",
                no: "Nej",
                credLabel: "Trovärdighet:",
                credHigh: "Hög",
                credMedium: "Medel",
                credLow: "Låg",
                sourcePrefix: "Källa",
                noFacts: "Inga publicerade fakta ännu!",
                noMoreFacts: "Inga fler nya fakta just nu.",
            },
            en: {
                randomBtn: "Tell me something I don't know",
                question: "Did you know this?",
                yes: "Yes",
                no: "No",
                credLabel: "Credibility:",
                credHigh: "High",
                credMedium: "Medium",
                credLow: "Low",
                sourcePrefix: "Source",
                noFacts: "No published facts yet!",
                noMoreFacts: "No more new facts right now.",
            },
        };

        let currentLang = (() => {
            try {
                const stored = localStorage.getItem(LANG_KEY);
                if (stored === "sv" || stored === "en") return stored;
            } catch {}
            // Auto-detect — om browsern är engelsk, börja på en, annars sv
            const navLang = (navigator.language || "sv").toLowerCase();
            return navLang.startsWith("en") ? "en" : "sv";
        })();

        function t(key) {
            return I18N[currentLang]?.[key] ?? I18N.sv[key] ?? key;
        }

        function credLabelText(level) {
            const map = { high: t("credHigh"), medium: t("credMedium"), low: t("credLow") };
            return map[level] || map.high;
        }

        function applyLangUI() {
            document.documentElement.lang = currentLang;
            document.getElementById("randomBtn").textContent = t("randomBtn");
            // Markera aktiv knapp
            document.querySelectorAll("#langSwitcher button").forEach(btn => {
                btn.classList.toggle("is-active", btn.dataset.lang === currentLang);
            });
            // Re-render aktuell fakta om en visas
            if (_currentFact) renderSingleFact();
        }

        function setLang(lang) {
            if (lang !== "sv" && lang !== "en") return;
            currentLang = lang;
            try { localStorage.setItem(LANG_KEY, lang); } catch {}
            applyLangUI();
        }

        document.getElementById("langSwitcher").addEventListener("click", (e) => {
            const btn = e.target.closest("button[data-lang]");
            if (btn) setLang(btn.dataset.lang);
        });

        // ========== FIREBASE (Firestore för klick-statistik) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBb564Dfem8IPMrKxV54AOsqLB6x8wqpu4",
            authDomain: "smartass-54b33.firebaseapp.com",
            projectId: "smartass-54b33",
            storageBucket: "smartass-54b33.firebasestorage.app",
            messagingSenderId: "802864537973",
            appId: "1:802864537973:web:bfea158ded445ff04fb33c"
        };

        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) {
            console.warn("Firebase init failed:", e);
        }

        // Stabil hash för faktatext → Firestore-doc-ID (a-z0-9, max ~12 tecken)
        function factHash(text) {
            const s = (text || "").trim();
            let h = 5381;
            for (let i = 0; i < s.length; i++) {
                h = ((h << 5) + h + s.charCodeAt(i)) >>> 0;
            }
            return "f" + h.toString(36);
        }

        function trackClick(fact, field) {
            if (!db) return;
            const key = factHash(fact.text);
            db.collection("factStats").doc(key).set({
                text: fact.text,
                [field]: firebase.firestore.FieldValue.increment(1),
                lastClicked: firebase.firestore.FieldValue.serverTimestamp(),
            }, { merge: true }).catch(e => console.warn("trackClick failed:", e));
        }

        // ========== PUBLISHED FACTS ==========
        let _publishedFacts = [];
        async function loadPublishedFacts() {
            try {
                const res = await fetch("published-data.json?" + Date.now());
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data)) _publishedFacts = data;
                }
            } catch {}
        }

        // ========== STATE ==========
        let _currentFact = null;
        let _slideDir = null;

        function currentFact() {
            return _currentFact;
        }

        function pickRandomFact() {
            if (_publishedFacts.length === 0) return null;
            const knownIds = getKnownFacts();
            const candidates = _publishedFacts.filter(f => !knownIds[factId(f)]);
            if (candidates.length === 0) return null;
            const unseen = candidates.filter(f => !isFactSeen(f));
            const pool = unseen.length > 0 ? unseen : candidates;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // ========== RENDER ==========
        function renderSingleFact() {
            const fact = currentFact();
            const factArea = document.getElementById("factArea");
            if (!fact) {
                factArea.innerHTML = "";
                return;
            }

            const animClass = _slideDir === "next" ? "anim-in-right"
                            : _slideDir === "prev" ? "anim-in-left"
                            : "anim-in-fade";
            _slideDir = null;

            const cred = fact.credibility || "high";
            const credLabel = credLabelText(cred);

            // Välj språk-specifik titel/text med fallback till svenska
            const factTitle = (currentLang === "en" && fact.title_en) ? fact.title_en : fact.title;
            const factText  = (currentLang === "en" && fact.text_en)  ? fact.text_en  : fact.text;

            let sourceHtml = "";
            const sourcePrefix = t("sourcePrefix");
            if (fact.sourceUrl) {
                const label = fact.sourceName ? `${sourcePrefix}: ${escapeHtml(fact.sourceName)}` : sourcePrefix;
                sourceHtml = `<a href="${escapeHtml(fact.sourceUrl)}" target="_blank" rel="noopener noreferrer" class="source-link">${label}</a>`;
            } else if (fact.sourceName) {
                sourceHtml = `<span class="source-text">${sourcePrefix}: ${escapeHtml(fact.sourceName)}</span>`;
            }

            const imageHtml = fact.imageUrl
                ? `<div class="fact-image-frame"><img src="${escapeHtml(fact.imageUrl)}" alt="" class="fact-image" loading="lazy" onerror="this.parentElement.remove()"></div>`
                : "";

            const titleHtml = factTitle
                ? `<div class="fact-title">${escapeHtml(factTitle)}</div>`
                : "";

            factArea.innerHTML = `
                <div class="fact-card ${animClass}">
                    ${imageHtml}
                    ${titleHtml}
                    <div class="fact-text">${escapeHtml(factText)}</div>
                    <div class="fact-footer">
                        <div class="credibility cred-${cred}">
                            <span class="cred-dot"></span>
                            <span>${t("credLabel")}</span>
                            <span class="cred-label">${credLabel}</span>
                        </div>
                        ${sourceHtml}
                    </div>
                </div>
                <div class="fact-question ${animClass}">${t("question")}</div>
                <div class="fact-actions ${animClass}">
                    <button class="fact-action-btn" id="learnedBtn">${t("no")}</button>
                    <button class="fact-action-btn is-dark" id="knewBtn">${t("yes")}</button>
                </div>`;

            document.getElementById("knewBtn")?.addEventListener("click", () => {
                trackClick(fact, "knewCount");
                markFactKnown(fact);
                showNewFact();
            });

            document.getElementById("learnedBtn")?.addEventListener("click", () => {
                trackClick(fact, "learnedCount");
                returnToStart();
            });
        }

        // ========== NAV ==========
        function enterCardMode() {
            document.getElementById("randomSection").style.display = "none";
            document.body.classList.add("card-mode");
        }

        function returnToStart() {
            _currentFact = null;
            document.getElementById("factArea").innerHTML = "";
            document.getElementById("randomSection").style.display = "";
            document.body.classList.remove("card-mode");
        }

        function showNewFact() {
            const fact = pickRandomFact();
            if (!fact) {
                document.getElementById("factArea").innerHTML =
                    `<div class="fact-card anim-in-fade"><div class="error-msg">${t("noMoreFacts")}</div></div>`;
                return;
            }
            markFactSeen(fact);
            _currentFact = fact;
            renderSingleFact();
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById("randomBtn").addEventListener("click", async () => {
            if (_publishedFacts.length === 0) {
                document.getElementById("factArea").innerHTML =
                    `<div class="fact-card anim-in-fade"><div class="error-msg">${t("noFacts")}</div></div>`;
                return;
            }
            const fact = pickRandomFact();
            if (!fact) {
                document.getElementById("factArea").innerHTML =
                    `<div class="fact-card anim-in-fade"><div class="error-msg">${t("noMoreFacts")}</div></div>`;
                return;
            }
            markFactSeen(fact);
            _currentFact = fact;
            enterCardMode();
            renderSingleFact();
        });

        // ========== INIT ==========
        applyLangUI();
        loadPublishedFacts();
    </script>
</body>
</html>
