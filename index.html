<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>SmartAss</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #ffffff;
            --text: #222222;
            --text-secondary: #999999;
            --green: #C2FF66;
            --border: #e8e8e8;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 540px;
            padding: 2rem 1.5rem;
            padding-bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .random-btn {
            width: 100%;
            padding: 1.3rem 1.5rem;
            background: var(--text);
            color: var(--bg);
            border: none;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }

        .random-btn:hover { background: #444; }
        .random-btn:active { transform: scale(0.98); }

        .fact-nav-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            margin-bottom: 0.75rem;
        }

        .fact-area {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .fact-area:empty { margin-bottom: 0; }

        .nav-arrow {
            display: none;
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: white;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: background 0.15s, border-color 0.15s, opacity 0.15s;
            padding: 0;
            user-select: none;
        }
        .nav-arrow.visible { display: flex; }
        .nav-arrow:hover:not(:disabled) { background: var(--green); border-color: var(--green); }
        .nav-arrow:disabled { opacity: 0.22; cursor: default; }

        .fact-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.4rem 1.3rem;
            text-align: left;
            border: 1.5px solid var(--border);
            touch-action: pan-y;
            will-change: transform, opacity;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(60px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-60px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideOutToLeft {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(-60px); }
        }
        @keyframes slideOutToRight {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(60px); }
        }
        .fact-card.anim-in-right  { animation: slideInFromRight 0.28s cubic-bezier(.25,.46,.45,.94) both; }
        .fact-card.anim-in-left   { animation: slideInFromLeft  0.28s cubic-bezier(.25,.46,.45,.94) both; }
        .fact-card.anim-in-fade   { animation: fadeIn           0.28s ease both; }
        .fact-card.anim-out-left  { animation: slideOutToLeft   0.22s ease forwards; pointer-events: none; }
        .fact-card.anim-out-right { animation: slideOutToRight  0.22s ease forwards; pointer-events: none; }

        .fact-text {
            font-size: 0.92rem;
            line-height: 1.65;
            color: var(--text);
        }

        .fact-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 1.4rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .fact-action-btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: white;
            font-size: 0.72rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-secondary);
        }
        .fact-action-btn:hover { border-color: var(--text); color: var(--text); }

        .error-msg {
            color: var(--text-secondary);
            font-size: 0.88rem;
            padding: 1.5rem 0;
            text-align: center;
        }

        @media (max-width: 500px) {
            .fact-nav-row {
                flex-wrap: wrap;
                gap: 0.75rem 0;
            }
            .fact-area {
                order: 1;
                flex-basis: 100%;
            }
            #prevArrow {
                order: 2;
                flex: 1;
                border-radius: 100px;
                height: 44px;
            }
            #nextArrow {
                order: 3;
                flex: 1;
                border-radius: 100px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="fact-nav-row">
            <button class="nav-arrow" id="prevArrow" disabled title="Föregående">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="fact-area" id="factArea"></div>
            <button class="nav-arrow" id="nextArrow" title="Nästa">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>
        <div id="randomSection" style="width:100%;">
            <button type="button" class="random-btn" id="randomBtn">Berätta något jag inte vet</button>
        </div>
    </div>

    <script>
        // ========== SEEN FACTS TRACKER (localStorage) ==========
        const SEEN_KEY = "smartass_seen";
        const SEEN_EXPIRY_DAYS = 7;

        function getSeenFacts() {
            try {
                const data = JSON.parse(localStorage.getItem(SEEN_KEY) || "{}");
                const cutoff = Date.now() - SEEN_EXPIRY_DAYS * 24 * 60 * 60 * 1000;
                const cleaned = {};
                for (const [key, ts] of Object.entries(data)) {
                    if (ts > cutoff) cleaned[key] = ts;
                }
                if (Object.keys(cleaned).length !== Object.keys(data).length) {
                    localStorage.setItem(SEEN_KEY, JSON.stringify(cleaned));
                }
                return cleaned;
            } catch { return {}; }
        }

        function factId(fact) {
            return (fact.text || "").slice(0, 80);
        }

        function markFactSeen(fact) {
            try {
                const data = getSeenFacts();
                data[factId(fact)] = Date.now();
                localStorage.setItem(SEEN_KEY, JSON.stringify(data));
            } catch {}
        }

        function isFactSeen(fact) {
            return !!getSeenFacts()[factId(fact)];
        }

        // ========== KNOWN FACTS TRACKER (localStorage) ==========
        const KNOWN_KEY = "smartass_known";

        function getKnownFacts() {
            try { return JSON.parse(localStorage.getItem(KNOWN_KEY) || "{}"); }
            catch { return {}; }
        }

        function markFactKnown(fact) {
            try {
                const data = getKnownFacts();
                data[factId(fact)] = Date.now();
                localStorage.setItem(KNOWN_KEY, JSON.stringify(data));
            } catch {}
        }

        function isFactKnown(fact) {
            return !!getKnownFacts()[factId(fact)];
        }

        // ========== HELPERS ==========
        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str ?? "";
            return div.innerHTML;
        }

        // ========== PUBLISHED FACTS ==========
        let _publishedFacts = [];
        async function loadPublishedFacts() {
            try {
                const res = await fetch("published-data.json?" + Date.now());
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data)) _publishedFacts = data;
                }
            } catch {}
        }

        // ========== STATE ==========
        let factHistory = [];
        let historyIndex = -1;
        let _slideDir = null;

        function currentFact() {
            return factHistory[historyIndex]?.fact || null;
        }

        function pickRandomFact() {
            if (_publishedFacts.length === 0) return null;
            const knownIds = getKnownFacts();
            const candidates = _publishedFacts.filter(f => !knownIds[factId(f)]);
            if (candidates.length === 0) return null;
            const unseen = candidates.filter(f => !isFactSeen(f));
            const pool = unseen.length > 0 ? unseen : candidates;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // ========== RENDER ==========
        function renderSingleFact() {
            const fact = currentFact();
            const factArea = document.getElementById("factArea");
            if (!fact) {
                factArea.innerHTML = "";
                return;
            }

            const animClass = _slideDir === "next" ? "anim-in-right"
                            : _slideDir === "prev" ? "anim-in-left"
                            : "anim-in-fade";
            _slideDir = null;

            factArea.innerHTML = `
                <div class="fact-card ${animClass}">
                    <div class="fact-text">${escapeHtml(fact.text)}</div>
                    <div class="fact-actions">
                        <button class="fact-action-btn" id="knownBtn">🧠 Visste redan</button>
                    </div>
                </div>`;

            document.getElementById("knownBtn")?.addEventListener("click", () => {
                markFactKnown(fact);
                showNextFact();
            });
        }

        // ========== NAV ==========
        function enterCardMode() {
            document.getElementById("randomSection").style.display = "none";
            document.getElementById("prevArrow").classList.add("visible");
            document.getElementById("nextArrow").classList.add("visible");
        }

        function updateArrows() {
            document.getElementById("prevArrow").disabled = historyIndex <= 0;
            document.getElementById("nextArrow").disabled = false;
        }

        async function animateNav(direction, changeFn) {
            const card = document.querySelector("#factArea .fact-card");
            if (card) {
                card.classList.add(direction === "next" ? "anim-out-left" : "anim-out-right");
                await new Promise(r => setTimeout(r, 210));
            }
            _slideDir = direction;
            changeFn();
        }

        function showPrevFact() {
            if (historyIndex <= 0) return;
            animateNav("prev", () => {
                historyIndex--;
                updateArrows();
                renderSingleFact();
            });
        }

        function showNextFact() {
            // If history has a forward entry, go to it
            if (historyIndex < factHistory.length - 1) {
                animateNav("next", () => {
                    historyIndex++;
                    updateArrows();
                    renderSingleFact();
                });
                return;
            }
            const fact = pickRandomFact();
            if (!fact) {
                animateNav("next", () => {
                    document.getElementById("factArea").innerHTML =
                        `<div class="fact-card anim-in-fade"><div class="error-msg">Inga fler nya fakta just nu.</div></div>`;
                });
                return;
            }
            animateNav("next", () => {
                markFactSeen(fact);
                factHistory.push({ fact });
                historyIndex = factHistory.length - 1;
                updateArrows();
                renderSingleFact();
            });
        }

        // ========== TOUCH SWIPE ==========
        (function() {
            let touchStartX = 0;
            let touchStartY = 0;
            const factArea = document.getElementById("factArea");
            factArea.addEventListener("touchstart", e => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            factArea.addEventListener("touchend", e => {
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50 && factHistory.length > 0) {
                    if (dx < 0) showNextFact();
                    else showPrevFact();
                }
            }, { passive: true });
        })();

        // ========== EVENT LISTENERS ==========
        document.getElementById("prevArrow").addEventListener("click", showPrevFact);
        document.getElementById("nextArrow").addEventListener("click", showNextFact);

        document.getElementById("randomBtn").addEventListener("click", async () => {
            if (_publishedFacts.length === 0) {
                document.getElementById("factArea").innerHTML =
                    `<div class="fact-card anim-in-fade"><div class="error-msg">Inga publicerade fakta ännu!</div></div>`;
                return;
            }
            const fact = pickRandomFact();
            if (!fact) {
                document.getElementById("factArea").innerHTML =
                    `<div class="fact-card anim-in-fade"><div class="error-msg">Inga fler nya fakta just nu.</div></div>`;
                return;
            }
            markFactSeen(fact);
            factHistory = [{ fact }];
            historyIndex = 0;
            enterCardMode();
            updateArrows();
            renderSingleFact();
        });

        // ========== INIT ==========
        loadPublishedFacts();
    </script>
</body>
</html>
